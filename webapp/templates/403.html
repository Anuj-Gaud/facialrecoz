<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FaceAttend — 403 Forbidden</title>
  <script>(function(){var t=localStorage.getItem('fa-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav>
  <a href="/" class="nav-brand"><div class="brand-icon">👁️</div>FaceAttend</a>
  <div class="nav-right">
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀️</button>
    <a href="/logout" class="btn btn-secondary" style="padding:.4rem .85rem;font-size:.8rem">Logout</a>
  </div>
</nav>
<div class="main-content">
  <div class="error-page">
    <div class="error-code">403</div>
    <p class="error-msg">You don't have permission to access this page.</p>
    <a href="/" class="btn btn-primary">← Go Back Home</a>
  </div>
</div>
<script>
function toggleTheme(){
  const d=document.documentElement,n=d.getAttribute('data-theme')==='light'?'dark':'light';
  d.setAttribute('data-theme',n); localStorage.setItem('fa-theme',n);
  document.getElementById('themeBtn').textContent=n==='light'?'🌙':'☀️';
}
(function(){const t=document.documentElement.getAttribute('data-theme');
  const b=document.getElementById('themeBtn'); if(b) b.textContent=t==='light'?'🌙':'☀️';})();
</script>
</body>

</html>
